<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SEO Audit Viewer — josiahcole.com</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0f1117;
    --surface: #1a1d27;
    --surface2: #22263a;
    --border: #2e3350;
    --text: #e2e8f0;
    --muted: #8892a4;
    --high: #ef4444;
    --high-bg: #3b0f0f;
    --medium: #f59e0b;
    --medium-bg: #3b2a0a;
    --low: #22c55e;
    --low-bg: #0a2e18;
    --accent: #6366f1;
    --accent-hover: #4f52d0;
  }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    font-size: 14px;
    line-height: 1.5;
  }

  header {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 16px 24px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-wrap: wrap;
    gap: 12px;
  }

  header h1 {
    font-size: 18px;
    font-weight: 700;
    color: var(--text);
  }

  header h1 span {
    color: var(--muted);
    font-weight: 400;
    font-size: 14px;
    margin-left: 8px;
  }

  .load-area {
    display: flex;
    align-items: center;
    gap: 10px;
    flex-wrap: wrap;
  }

  .btn {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    padding: 7px 14px;
    border-radius: 6px;
    font-size: 13px;
    font-weight: 500;
    cursor: pointer;
    border: none;
    transition: background 0.15s;
  }

  .btn-primary { background: var(--accent); color: #fff; }
  .btn-primary:hover { background: var(--accent-hover); }
  .btn-outline {
    background: transparent;
    color: var(--muted);
    border: 1px solid var(--border);
  }
  .btn-outline:hover { border-color: var(--accent); color: var(--text); }

  #file-input { display: none; }

  /* Drop zone */
  #drop-zone {
    margin: 40px auto;
    max-width: 480px;
    border: 2px dashed var(--border);
    border-radius: 12px;
    padding: 60px 32px;
    text-align: center;
    cursor: pointer;
    transition: border-color 0.2s, background 0.2s;
  }
  #drop-zone:hover, #drop-zone.drag-over {
    border-color: var(--accent);
    background: #1a1d27;
  }
  #drop-zone svg { color: var(--muted); margin-bottom: 16px; }
  #drop-zone p { color: var(--muted); margin-top: 8px; font-size: 13px; }
  #drop-zone strong { color: var(--text); display: block; font-size: 16px; margin-top: 4px; }

  /* Stats bar */
  #stats-bar {
    display: none;
    padding: 16px 24px;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    gap: 12px;
    flex-wrap: wrap;
    align-items: center;
  }

  .stat-card {
    display: flex;
    align-items: center;
    gap: 10px;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 10px 16px;
    min-width: 110px;
  }
  .stat-card .label { color: var(--muted); font-size: 11px; text-transform: uppercase; letter-spacing: .05em; }
  .stat-card .value { font-size: 22px; font-weight: 700; }
  .stat-card.high .value { color: var(--high); }
  .stat-card.medium .value { color: var(--medium); }
  .stat-card.low .value { color: var(--low); }
  .stat-card.total .value { color: var(--text); }
  .stat-card.matched .value { color: var(--accent); }

  /* Toolbar */
  #toolbar {
    display: none;
    padding: 12px 24px;
    border-bottom: 1px solid var(--border);
    gap: 10px;
    flex-wrap: wrap;
    align-items: center;
    background: var(--bg);
  }

  .search-wrap {
    position: relative;
    flex: 1;
    min-width: 200px;
    max-width: 360px;
  }
  .search-wrap svg {
    position: absolute;
    left: 10px;
    top: 50%;
    transform: translateY(-50%);
    color: var(--muted);
    pointer-events: none;
  }
  #search {
    width: 100%;
    padding: 7px 10px 7px 34px;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 6px;
    color: var(--text);
    font-size: 13px;
    outline: none;
    transition: border-color 0.15s;
  }
  #search:focus { border-color: var(--accent); }

  .filter-group {
    display: flex;
    gap: 4px;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 3px;
  }
  .filter-btn {
    padding: 4px 12px;
    border-radius: 4px;
    border: none;
    background: transparent;
    color: var(--muted);
    font-size: 12px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.15s;
    text-transform: uppercase;
    letter-spacing: .05em;
  }
  .filter-btn.active { color: #fff; }
  .filter-btn[data-risk="ALL"].active { background: var(--surface); color: var(--text); }
  .filter-btn[data-risk="HIGH"].active { background: var(--high); }
  .filter-btn[data-risk="MEDIUM"].active { background: var(--medium); color: #1a1200; }
  .filter-btn[data-risk="LOW"].active { background: var(--low); color: #001a0a; }

  .select-wrap select {
    padding: 7px 10px;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 6px;
    color: var(--text);
    font-size: 13px;
    outline: none;
    cursor: pointer;
  }
  .select-wrap select:focus { border-color: var(--accent); }

  .result-count {
    color: var(--muted);
    font-size: 12px;
    margin-left: auto;
    white-space: nowrap;
  }

  /* Table */
  #table-wrap {
    display: none;
    overflow-x: auto;
    padding: 0 24px 24px;
  }

  table {
    width: 100%;
    border-collapse: collapse;
    font-size: 13px;
  }

  thead th {
    background: var(--surface);
    color: var(--muted);
    font-weight: 600;
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: .06em;
    padding: 10px 12px;
    text-align: left;
    border-bottom: 1px solid var(--border);
    position: sticky;
    top: 0;
    cursor: pointer;
    user-select: none;
    white-space: nowrap;
  }
  thead th:hover { color: var(--text); }
  thead th.sort-asc::after { content: ' ↑'; }
  thead th.sort-desc::after { content: ' ↓'; }

  tbody tr {
    border-bottom: 1px solid var(--border);
    transition: background 0.1s;
  }
  tbody tr:hover { background: var(--surface2); }
  tbody tr.risk-HIGH { border-left: 3px solid var(--high); }
  tbody tr.risk-MEDIUM { border-left: 3px solid var(--medium); }
  tbody tr.risk-LOW { border-left: 3px solid var(--low); }

  td {
    padding: 10px 12px;
    vertical-align: top;
    max-width: 280px;
  }

  .td-title a {
    color: var(--text);
    text-decoration: none;
    font-weight: 500;
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
    overflow: hidden;
  }
  .td-title a:hover { color: var(--accent); text-decoration: underline; }

  .td-id { color: var(--muted); font-size: 11px; }

  .badge-risk {
    display: inline-block;
    padding: 2px 8px;
    border-radius: 4px;
    font-size: 11px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: .05em;
  }
  .badge-HIGH { background: var(--high-bg); color: var(--high); }
  .badge-MEDIUM { background: var(--medium-bg); color: var(--medium); }
  .badge-LOW { background: var(--low-bg); color: var(--low); }

  .pv-value {
    font-weight: 600;
    font-variant-numeric: tabular-nums;
  }
  .pv-zero { color: var(--high); }
  .pv-low { color: var(--medium); }
  .pv-ok { color: var(--low); }

  .tag-notes {
    display: flex;
    flex-wrap: wrap;
    gap: 3px;
  }
  .tag {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 3px;
    padding: 1px 5px;
    font-size: 10px;
    color: var(--muted);
    white-space: nowrap;
  }
  .tag.dead-page { border-color: var(--high); color: var(--high); }
  .tag.no-traffic { border-color: var(--medium); color: var(--medium); }

  .td-cats { color: var(--muted); font-size: 11px; }

  .td-date { color: var(--muted); font-size: 12px; white-space: nowrap; }

  .num { text-align: right; font-variant-numeric: tabular-nums; }

  /* Pagination */
  #pagination {
    display: none;
    padding: 16px 24px;
    align-items: center;
    justify-content: space-between;
    border-top: 1px solid var(--border);
    flex-wrap: wrap;
    gap: 10px;
    background: var(--bg);
  }
  #pagination .page-info { color: var(--muted); font-size: 12px; }
  #pagination .page-btns { display: flex; gap: 6px; }
  #pagination button {
    padding: 5px 12px;
    border-radius: 5px;
    border: 1px solid var(--border);
    background: var(--surface2);
    color: var(--text);
    cursor: pointer;
    font-size: 12px;
  }
  #pagination button:hover:not(:disabled) { border-color: var(--accent); color: var(--accent); }
  #pagination button:disabled { opacity: 0.35; cursor: default; }
  #pagination button.current { background: var(--accent); border-color: var(--accent); color: #fff; }

  /* Responsive */
  @media (max-width: 768px) {
    header { padding: 12px 16px; }
    #table-wrap { padding: 0 12px 16px; }
    td, th { padding: 8px; }
    .col-cats, .col-id, .col-last-seen { display: none; }
  }
</style>
</head>
<body>

<header>
  <h1>SEO Audit <span>josiahcole.com</span></h1>
  <div class="load-area">
    <button class="btn btn-outline" onclick="document.getElementById('file-input').click()">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
      Load CSV
    </button>
    <button class="btn btn-primary" onclick="fetchFromSite()">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
      Fetch Live
    </button>
    <input type="file" id="file-input" accept=".csv" onchange="handleFile(this.files[0])">
  </div>
</header>

<div id="stats-bar"></div>
<div id="toolbar"></div>
<div id="table-wrap"></div>
<div id="pagination"></div>

<div id="drop-zone" ondragover="onDragOver(event)" ondragleave="onDragLeave(event)" ondrop="onDrop(event)" onclick="document.getElementById('file-input').click()">
  <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
    <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
    <polyline points="14 2 14 8 20 8"/>
    <line x1="16" y1="13" x2="8" y2="13"/>
    <line x1="16" y1="17" x2="8" y2="17"/>
    <polyline points="10 9 9 9 8 9"/>
  </svg>
  <strong>Drop seo-audit.csv here</strong>
  <p>or click to browse · or use "Fetch Live" with Basic Auth credentials</p>
</div>

<script>
// ─── State ──────────────────────────────────────────────────────────────────
let allRows = [];
let filtered = [];
let sortCol = null;
let sortDir = 1;
let riskFilter = 'ALL';
let searchQuery = '';
let page = 1;
const PER_PAGE = 50;

// ─── CSV Parser ──────────────────────────────────────────────────────────────
function parseCSV(text) {
  const lines = text.trim().split('\n');
  const headers = splitCSVLine(lines[0]);
  return lines.slice(1).map(line => {
    const vals = splitCSVLine(line);
    const obj = {};
    headers.forEach((h, i) => obj[h.trim()] = (vals[i] || '').trim());
    return obj;
  }).filter(r => r.ID);
}

function splitCSVLine(line) {
  const result = [];
  let cur = '', inQ = false;
  for (let i = 0; i < line.length; i++) {
    const c = line[i];
    if (c === '"' && !inQ) { inQ = true; }
    else if (c === '"' && inQ) { if (line[i+1] === '"') { cur += '"'; i++; } else inQ = false; }
    else if (c === ',' && !inQ) { result.push(cur); cur = ''; }
    else cur += c;
  }
  result.push(cur);
  return result;
}

// ─── Load handlers ───────────────────────────────────────────────────────────
function handleFile(file) {
  if (!file) return;
  const reader = new FileReader();
  reader.onload = e => init(e.target.result);
  reader.readAsText(file);
}

function fetchFromSite() {
  const user = prompt('Basic Auth username:');
  if (user === null) return;
  const pass = prompt('Basic Auth password:');
  if (pass === null) return;
  const url = 'https://www.josiahcole.com/wp-content/uploads/seo-audit.csv';
  fetch(url, { headers: { 'Authorization': 'Basic ' + btoa(user + ':' + pass) } })
    .then(r => { if (!r.ok) throw new Error('HTTP ' + r.status); return r.text(); })
    .then(init)
    .catch(e => alert('Could not fetch: ' + e.message + '\n\nTry loading the CSV file directly instead.'));
}

function onDragOver(e) { e.preventDefault(); document.getElementById('drop-zone').classList.add('drag-over'); }
function onDragLeave(e) { document.getElementById('drop-zone').classList.remove('drag-over'); }
function onDrop(e) {
  e.preventDefault();
  document.getElementById('drop-zone').classList.remove('drag-over');
  const file = e.dataTransfer.files[0];
  if (file) handleFile(file);
}

// ─── Init ────────────────────────────────────────────────────────────────────
function init(csvText) {
  allRows = parseCSV(csvText);
  document.getElementById('drop-zone').style.display = 'none';
  renderStats();
  buildToolbar();
  applyFilters();
}

// ─── Stats ───────────────────────────────────────────────────────────────────
function renderStats() {
  const counts = { HIGH: 0, MEDIUM: 0, LOW: 0 };
  let matched = 0;
  allRows.forEach(r => {
    counts[r.Risk] = (counts[r.Risk] || 0) + 1;
    if (parseInt(r.Matomo_PV) > 0) matched++;
  });

  const bar = document.getElementById('stats-bar');
  bar.style.display = 'flex';
  bar.innerHTML = `
    <div class="stat-card total"><div><div class="label">Total Posts</div><div class="value">${allRows.length}</div></div></div>
    <div class="stat-card high"><div><div class="label">HIGH Risk</div><div class="value">${counts.HIGH || 0}</div></div></div>
    <div class="stat-card medium"><div><div class="label">MEDIUM Risk</div><div class="value">${counts.MEDIUM || 0}</div></div></div>
    <div class="stat-card low"><div><div class="label">LOW Risk</div><div class="value">${counts.LOW || 0}</div></div></div>
    <div class="stat-card matched"><div><div class="label">With Traffic</div><div class="value">${matched}</div></div></div>
    <div class="stat-card total"><div><div class="label">Zero Traffic</div><div class="value" style="color:#ef4444">${allRows.length - matched}</div></div></div>
  `;
}

// ─── Toolbar ─────────────────────────────────────────────────────────────────
function buildToolbar() {
  const tb = document.getElementById('toolbar');
  tb.style.display = 'flex';

  // Collect unique categories
  const catSet = new Set();
  allRows.forEach(r => r.Categories.split('|').forEach(c => { if (c) catSet.add(c.trim()); }));
  const cats = ['All Categories', ...Array.from(catSet).sort()];

  tb.innerHTML = `
    <div class="search-wrap">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
      <input id="search" type="text" placeholder="Search title, notes, categories…" oninput="onSearch(this.value)">
    </div>
    <div class="filter-group">
      <button class="filter-btn active" data-risk="ALL" onclick="setRisk('ALL')">All</button>
      <button class="filter-btn" data-risk="HIGH" onclick="setRisk('HIGH')">High</button>
      <button class="filter-btn" data-risk="MEDIUM" onclick="setRisk('MEDIUM')">Medium</button>
      <button class="filter-btn" data-risk="LOW" onclick="setRisk('LOW')">Low</button>
    </div>
    <div class="select-wrap">
      <select id="cat-filter" onchange="applyFilters()">
        ${cats.map(c => `<option>${c}</option>`).join('')}
      </select>
    </div>
    <div class="select-wrap">
      <select id="traffic-filter" onchange="applyFilters()">
        <option value="all">All Traffic</option>
        <option value="zero">Zero Traffic Only</option>
        <option value="some">Has Traffic</option>
      </select>
    </div>
    <span class="result-count" id="result-count"></span>
  `;
}

function onSearch(val) {
  searchQuery = val.toLowerCase();
  page = 1;
  applyFilters();
}

function setRisk(risk) {
  riskFilter = risk;
  page = 1;
  document.querySelectorAll('.filter-btn').forEach(b => {
    b.classList.toggle('active', b.dataset.risk === risk);
  });
  applyFilters();
}

// ─── Filter + Sort ───────────────────────────────────────────────────────────
function applyFilters() {
  const catFilter = document.getElementById('cat-filter')?.value || 'All Categories';
  const trafficFilter = document.getElementById('traffic-filter')?.value || 'all';

  filtered = allRows.filter(r => {
    if (riskFilter !== 'ALL' && r.Risk !== riskFilter) return false;
    if (catFilter !== 'All Categories' && !r.Categories.split('|').map(c => c.trim()).includes(catFilter)) return false;
    const pv = parseInt(r.Matomo_PV) || 0;
    if (trafficFilter === 'zero' && pv > 0) return false;
    if (trafficFilter === 'some' && pv === 0) return false;
    if (searchQuery) {
      const hay = (r.Title + r.Notes + r.Categories + r.URL).toLowerCase();
      if (!hay.includes(searchQuery)) return false;
    }
    return true;
  });

  if (sortCol) sortFiltered();
  document.getElementById('result-count').textContent = `${filtered.length} of ${allRows.length} posts`;
  renderTable();
  renderPagination();
}

function sortFiltered() {
  filtered.sort((a, b) => {
    let av = a[sortCol], bv = b[sortCol];
    const num = ['Age_Days', 'Word_Count', 'Matomo_PV', 'ID'].includes(sortCol);
    if (num) { av = parseFloat(av) || 0; bv = parseFloat(bv) || 0; }
    if (av < bv) return -sortDir;
    if (av > bv) return sortDir;
    return 0;
  });
}

function setSort(col) {
  if (sortCol === col) sortDir *= -1;
  else { sortCol = col; sortDir = 1; }
  document.querySelectorAll('thead th').forEach(th => {
    th.classList.remove('sort-asc', 'sort-desc');
    if (th.dataset.col === col) th.classList.add(sortDir === 1 ? 'sort-asc' : 'sort-desc');
  });
  applyFilters();
}

// ─── Table ───────────────────────────────────────────────────────────────────
const COLS = [
  { key: 'ID', label: 'ID', cls: 'col-id' },
  { key: 'Title', label: 'Title / URL' },
  { key: 'Published', label: 'Published', cls: 'col-date' },
  { key: 'Age_Days', label: 'Age', cls: 'num' },
  { key: 'Word_Count', label: 'Words', cls: 'num' },
  { key: 'Matomo_PV', label: 'PV', cls: 'num' },
  { key: 'Last_Seen', label: 'Last Seen', cls: 'col-last-seen' },
  { key: 'Categories', label: 'Categories', cls: 'col-cats' },
  { key: 'Risk', label: 'Risk' },
  { key: 'Notes', label: 'Notes' },
];

function renderTable() {
  const wrap = document.getElementById('table-wrap');
  wrap.style.display = 'block';

  const start = (page - 1) * PER_PAGE;
  const pageRows = filtered.slice(start, start + PER_PAGE);

  wrap.innerHTML = `<table>
    <thead><tr>${COLS.map(c =>
      `<th data-col="${c.key}" class="${c.cls || ''}" onclick="setSort('${c.key}')">${c.label}</th>`
    ).join('')}</tr></thead>
    <tbody>${pageRows.map(renderRow).join('')}</tbody>
  </table>`;

  // Re-apply sort indicators
  if (sortCol) {
    const th = wrap.querySelector(`th[data-col="${sortCol}"]`);
    if (th) th.classList.add(sortDir === 1 ? 'sort-asc' : 'sort-desc');
  }
}

function renderRow(r) {
  const pv = parseInt(r.Matomo_PV) || 0;
  const pvClass = pv === 0 ? 'pv-zero' : pv < 10 ? 'pv-low' : 'pv-ok';
  const age = parseInt(r.Age_Days) || 0;
  const ageYrs = (age / 365).toFixed(1);

  const notesList = r.Notes ? r.Notes.split(';').map(n => {
    const t = n.trim();
    if (!t) return '';
    const cls = t === 'dead page' ? 'dead-page' : t === 'no traffic' ? 'no-traffic' : '';
    return `<span class="tag ${cls}">${t}</span>`;
  }).join('') : '';

  const pub = r.Published ? r.Published.split(' ')[0] : '';
  const lastSeen = r.Last_Seen ? r.Last_Seen.split(' ')[0] : '—';
  const cats = r.Categories ? r.Categories.split('|').filter(Boolean).join(', ') : '—';

  return `<tr class="risk-${r.Risk}">
    <td class="td-id col-id">${r.ID}</td>
    <td class="td-title">
      <a href="${r.URL}" target="_blank" rel="noopener">${escHtml(r.Title)}</a>
    </td>
    <td class="td-date col-date">${pub}</td>
    <td class="num">${ageYrs}y</td>
    <td class="num">${Number(r.Word_Count).toLocaleString()}</td>
    <td class="num"><span class="pv-value ${pvClass}">${pv.toLocaleString()}</span></td>
    <td class="td-date col-last-seen">${lastSeen}</td>
    <td class="td-cats col-cats">${escHtml(cats)}</td>
    <td><span class="badge-risk badge-${r.Risk}">${r.Risk}</span></td>
    <td><div class="tag-notes">${notesList}</div></td>
  </tr>`;
}

function escHtml(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ─── Pagination ──────────────────────────────────────────────────────────────
function renderPagination() {
  const totalPages = Math.ceil(filtered.length / PER_PAGE);
  const pg = document.getElementById('pagination');

  if (totalPages <= 1) { pg.style.display = 'none'; return; }
  pg.style.display = 'flex';

  const start = (page - 1) * PER_PAGE + 1;
  const end = Math.min(page * PER_PAGE, filtered.length);

  let btns = '';
  for (let i = 1; i <= totalPages; i++) {
    if (totalPages > 10 && Math.abs(i - page) > 2 && i !== 1 && i !== totalPages) {
      if (i === 2 || i === totalPages - 1) btns += `<button disabled>…</button>`;
      continue;
    }
    btns += `<button onclick="goPage(${i})" class="${i === page ? 'current' : ''}">${i}</button>`;
  }

  pg.innerHTML = `
    <span class="page-info">Showing ${start}–${end} of ${filtered.length}</span>
    <div class="page-btns">
      <button onclick="goPage(${page - 1})" ${page <= 1 ? 'disabled' : ''}>← Prev</button>
      ${btns}
      <button onclick="goPage(${page + 1})" ${page >= totalPages ? 'disabled' : ''}>Next →</button>
    </div>
  `;
}

function goPage(n) {
  const totalPages = Math.ceil(filtered.length / PER_PAGE);
  page = Math.max(1, Math.min(n, totalPages));
  renderTable();
  renderPagination();
  document.getElementById('table-wrap').scrollIntoView({ behavior: 'smooth', block: 'start' });
}
</script>
</body>
</html>
